name: Weekly Layer2 drift check

on:
  schedule:
    # 月曜 05:00 JST = 日曜 20:00 UTC
    - cron: "0 20 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Run Layer2 checks via Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run --project universal-settings --config prd -- python checks/run_all.py

      - name: Commit status.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- status.json; then
            git add status.json
            git commit -m "chore: status.json 更新 (weekly check)"
            git push
          else
            echo "status.json に変更なし"
          fi
