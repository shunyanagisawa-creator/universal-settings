name: Monthly shared-infra report issue

on:
  schedule:
    # 毎月1日 09:00 JST = 毎月1日 00:00 UTC (cron は UTC。JST 早朝を UTC 前日で表すと日付指定がずれるため 09:00 JST に設定)
    - cron: "0 0 1 * *"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render issue title/body from status.json
        id: render
        run: |
          python checks/render_issue.py status.json > /tmp/rendered.txt
          {
            echo "title<<EOF_TITLE"
            sed -n '1p' /tmp/rendered.txt
            echo "EOF_TITLE"
          } >> "$GITHUB_OUTPUT"
          {
            echo "body<<EOF_BODY"
            sed -n '/^---BODY---$/,$p' /tmp/rendered.txt | sed '1d'
            echo "EOF_BODY"
          } >> "$GITHUB_OUTPUT"

      - name: Create issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_TITLE: ${{ steps.render.outputs.title }}
          ISSUE_BODY: ${{ steps.render.outputs.body }}
        run: |
          gh issue create --title "$ISSUE_TITLE" --body "$ISSUE_BODY"
